<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 280px;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 16px;
            background: #0a0a0f;
            color: #f1f5f9;
            margin: 0;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #6366f1;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #94a3b8;
        }

        select {
            width: 100%;
            padding: 8px;
            background: #12121a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        select:focus {
            border-color: #6366f1;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #22c55e;
            min-height: 15px;
        }
    </style>
</head>

<body>
    <h2>Veridex Settings</h2>

    <div class="form-group">
        <label for="provider">Select Verification API:</label>
        <select id="provider">
            <option value="groq">Groq (Fastest)</option>
            <option value="gemini">Google Gemini</option>
        </select>
    </div>

    <button id="save">Save Settings</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>

</html>
